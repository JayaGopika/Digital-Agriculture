kind = "mobile"
previewPath = "/"
title = "AgriBridge"
version = "1.0.0"
id = "artifacts/agribridge"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
localPort = 25160
name = "expo"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/agribridge run dev"

[services.env]
PORT = "25160"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/agribridge", "run", "build"]
run = ["pnpm", "--filter", "@workspace/agribridge", "run", "serve"]
